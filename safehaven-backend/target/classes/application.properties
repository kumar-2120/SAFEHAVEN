# ── Server ────────────────────────────────────────────────────────────────
server.port=8080

# ── H2 Embedded Database ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:safehavendb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── H2 Console: disabled by default; enabled only when the 'dev' profile is
#    active (spring.profiles.active=dev).  Never enable in production.
spring.h2.console.enabled=false

# ── Application name ──────────────────────────────────────────────────────
spring.application.name=safehaven-backend
